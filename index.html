<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rose: "#ff7fb0",
              lilac: "#e9dcff",
              mist: "#fff6fb"
            },
            boxShadow: {
              glow: "0 0 24px rgba(255, 127, 176, 0.45)",
              soft: "0 20px 60px rgba(119, 80, 130, 0.14)"
            },
            backdropBlur: {
              xs: "2px"
            },
            animation: {
              shimmer: "shimmer 8s ease-in-out infinite"
            },
            keyframes: {
              shimmer: {
                "0%, 100%": { transform: "translateX(-8%)" },
                "50%": { transform: "translateX(8%)" }
              }
            }
          }
        }
      };
    </script>
    <script type="module">
      import React, { useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
      import { motion, AnimatePresence } from "https://esm.sh/framer-motion@11.11.9";
      import htm from "https://esm.sh/htm@3.1.1";

      const html = htm.bind(React.createElement);

      const photos = [
        "images/photo-1.png",
        "images/photo-2.png",
        "images/photo-3.png",
        "images/photo-4.png",
        "images/photo-5.png",
        "images/photo-6.png",
        "images/photo-7.png",
        "images/photo-8.png",
        "images/photo-9.png",
        "images/photo-10.png",
        "images/photo-11.png",
        "images/photo-12.png",
        "images/photo-13.png",
        "images/photo-14.png"
      ];

      const captions = [
        "This one takes me back to when things felt simple and warm.",
        "This still feels like one of my favorite moments with you.",
        "You made this day lighter without even trying.",
        "I keep coming back to this because it reminds me of us at our best.",
        "Even far away, you still feel like home to me.",
        "I miss this version of us laughing and being okay.",
        "You matter more to me than I showed in that argument.",
        "I remember this and wish I had chosen patience over pride.",
        "No matter the distance, your presence still reaches me here.",
        "This moment reminds me what I never want to lose again.",
        "I’d choose this peace with you over being right any day.",
        "I never want one bad moment to erase everything good between us.",
        "If I could relive one memory right now, it would be this one with you.",
        "I’m still here, still in love, still hoping we can fix this together."
      ];

      const questions = [
        "Do you still love me a little bit?",
        "Can we fix this together?",
        "Will you give me one more chance?",
        "Can we start again, slowly but honestly?",
        "Can I make this up to you with actions, not just words?",
        "Will you let me be better for you from now on?",
        "Can we choose us over this one painful moment?",
        "Can I hear your side fully and hold it with respect?",
        "Would you let me take care of your heart better this time?",
        "Can we talk today and not let this silence grow bigger than us?"
      ];

      const apologyLines = [
        "I know what I said hurt you, and I’ve been thinking about it a lot.",
        "Not to defend myself, but to understand how it must have felt for you.",
        "You didn’t deserve those words especially not from me.",
        "Being far from you is already difficult, and instead of making things better, I made it worse. I’m really sorry for that.",
        "I miss us… the way we talk, the way things feel when we’re okay.",
        "I don’t expect everything to be fixed instantly, but I do hope you’ll give me one chance to make it right.",
        "Because what we have matters to me more than my ego ever should."
      ];

      const sectionVariant = {
        hidden: { opacity: 0, y: 40 },
        show: { opacity: 1, y: 0, transition: { duration: 0.8, ease: [0.23, 1, 0.32, 1] } }
      };

      function useTypewriter(lines, speed = 34) {
        const fullText = useMemo(() => lines.join("\n"), [lines]);
        const [typed, setTyped] = useState("");
        useEffect(() => {
          let i = 0;
          const timer = setInterval(() => {
            i += 1;
            setTyped(fullText.slice(0, i));
            if (i >= fullText.length) clearInterval(timer);
          }, speed);
          return () => clearInterval(timer);
        }, [fullText, speed]);
        return typed;
      }

      function useTimeSince(dateString) {
        const [now, setNow] = useState(Date.now());
        useEffect(() => {
          const timer = setInterval(() => setNow(Date.now()), 1000);
          return () => clearInterval(timer);
        }, []);
        const start = new Date(dateString).getTime();
        const diff = Math.max(now - start, 0);
        const totalHours = Math.floor(diff / (1000 * 60 * 60));
        return {
          days: Math.floor(diff / (1000 * 60 * 60 * 24)),
          hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
          minutes: Math.floor((diff / (1000 * 60)) % 60),
          seconds: Math.floor((diff / 1000) % 60),
          totalHours
        };
      }

      function FloatingHearts() {
        const items = Array.from({ length: 24 }, (_, i) => i);
        return html`
          <div className="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
            ${items.map(
              (i) => html`
                <${motion.div}
                  key=${i}
                  className="absolute text-rose/25"
                  initial=${{ y: "110vh", x: `${(i * 11) % 98}vw`, opacity: 0.12, scale: 0.7 }}
                  animate=${{ y: "-20vh", opacity: [0.12, 0.45, 0.12], scale: [0.7, 1.1, 0.75] }}
                  transition=${{ duration: 12 + (i % 9), repeat: Infinity, delay: i * 0.35, ease: "linear" }}
                >
                  ${i % 2 ? "♥" : "♡"}
                </${motion.div}>
              `
            )}
          </div>
        `;
      }

      function GlassPanel({ className, children }) {
        return html`<div className=${`rounded-3xl border border-white/45 bg-white/50 backdrop-blur-xl shadow-soft ${className || ""}"`}>${children}</div>`;
      }

      function MemoryCard({ photo, caption, idx, onOpen }) {
        return html`
          <${motion.div}
            className="group relative overflow-hidden rounded-3xl border border-white/45 bg-white/65 shadow-soft backdrop-blur"
            initial=${{ opacity: 0, y: 35, scale: 0.96 }}
            whileInView=${{ opacity: 1, y: 0, scale: 1 }}
            viewport=${{ once: true, amount: 0.2 }}
            transition=${{ duration: 0.65, delay: idx * 0.09 }}
            whileHover=${{ y: -8, rotateX: 2, rotateY: idx % 2 ? -2 : 2 }}
            style=${{ transformStyle: "preserve-3d" }}
            onClick=${() => onOpen(photo, caption)}
          >
            <div className="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/25 to-transparent transition-transform duration-700 group-hover:translate-x-full"></div>
            <img src=${encodeURI(photo)} alt=${caption} className="h-56 w-full object-cover transition duration-700 group-hover:scale-110" />
            <p className="p-4 text-sm text-slate-700">${caption}</p>
          </${motion.div}>
        `;
      }

      function App() {
        const [noPosByQuestion, setNoPosByQuestion] = useState(() =>
          questions.map(() => ({ x: 0, y: 0 }))
        );
        const [yesBurst, setYesBurst] = useState(false);
        const [isPlaying, setIsPlaying] = useState(true);
        const [surpriseOpen, setSurpriseOpen] = useState(false);
        const [secondSurpriseOpen, setSecondSurpriseOpen] = useState(false);
        const [parallax, setParallax] = useState({ x: 0, y: 0 });
        const [selectedMemory, setSelectedMemory] = useState(null);
        const typed = useTypewriter(apologyLines);
        const iframeRef = useRef(null);
        const { days, hours, minutes, seconds, totalHours } = useTimeSince("2025-11-11T00:00:00");

        useEffect(() => {
          const onMove = (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 18;
            const y = (e.clientY / window.innerHeight - 0.5) * 18;
            setParallax({ x, y });
          };
          window.addEventListener("mousemove", onMove);
          return () => window.removeEventListener("mousemove", onMove);
        }, []);

        const moveNoButton = (idx) => {
          setNoPosByQuestion((prev) =>
            prev.map((pos, i) =>
              i === idx
                ? { x: Math.floor(Math.random() * 160) - 80, y: Math.floor(Math.random() * 90) - 45 }
                : pos
            )
          );
        };

        const onYesClick = () => {
          setYesBurst(true);
          setTimeout(() => setYesBurst(false), 2000);
        };

        const handleIframeLoad = () => {
          if (iframeRef.current) {
            iframeRef.current.contentWindow.postMessage('{"event":"command","func":"setVolume","args":[35]}', '*');
          }
        };

        const toggleMusic = () => {
          if (!iframeRef.current) return;
          if (isPlaying) {
            iframeRef.current.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            setIsPlaying(false);
          } else {
            iframeRef.current.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            setIsPlaying(true);
          }
        };

        return html`
          <main className="relative min-h-screen overflow-x-hidden bg-gradient-to-b from-[#fff6fb] via-white to-[#f3ebff] text-slate-800">
            <div className="pointer-events-none absolute inset-0 -z-20 bg-[radial-gradient(circle_at_20%_15%,rgba(255,180,214,0.45),transparent_32%),radial-gradient(circle_at_82%_18%,rgba(216,196,255,0.45),transparent_34%),radial-gradient(circle_at_50%_90%,rgba(255,210,235,0.4),transparent_36%)]"></div>
            <${FloatingHearts} />
            <iframe
              ref=${iframeRef}
              onLoad=${handleIframeLoad}
              src="https://www.youtube.com/embed/cYOV5i85fsw?enablejsapi=1&version=3&playerapiid=ytplayer&autoplay=1&mute=0"
              allow="autoplay; encrypted-media"
              className="absolute -z-50 h-0 w-0 opacity-0"
              title="youtube-audio"
            ></iframe>

            <section className="relative flex min-h-screen items-center justify-center px-6 py-16">
              <${motion.div}
                initial=${{ opacity: 0, y: 42 }}
                animate=${{ opacity: 1, y: 0 }}
                transition=${{ duration: 1, ease: [0.23, 1, 0.32, 1] }}
                style=${{ x: parallax.x * -0.7, y: parallax.y * -0.7 }}
                className="relative mx-auto max-w-4xl"
              >
                <div className="absolute -inset-6 rounded-[2rem] bg-gradient-to-r from-pink-200/40 to-purple-200/45 blur-2xl"></div>
                <div className="relative rounded-[2rem] border border-white/50 bg-white/55 p-9 text-center shadow-soft backdrop-blur-2xl md:p-14">
                  <p className="mb-4 text-xs uppercase tracking-[0.28em] text-slate-500">For The Girl I Love</p>
                  <h1 className="text-3xl font-semibold leading-tight text-slate-900 md:text-6xl">I messed up… and I know it hurt you.</h1>
                  <p className="mx-auto mt-7 max-w-3xl whitespace-pre-line text-base leading-relaxed text-slate-700 md:text-lg">
                    I’ve been thinking about what I said, and I regret it.
                    You didn’t deserve that
                    I just want a chance to say this properly.
                  </p>
                  <button onClick=${() => document.getElementById("memory-lane")?.scrollIntoView({ behavior: "smooth" })} className="mt-10 rounded-full bg-rose px-8 py-3.5 text-white shadow-glow transition hover:scale-105 hover:bg-pink-500">
                    Please hear me out
                  </button>
                </div>
              </${motion.div}>
            </section>

            <${motion.section} id="memory-lane" variants=${sectionVariant} initial="hidden" whileInView="show" viewport=${{ once: true, amount: 0.2 }} className="mx-auto max-w-6xl px-6 py-20">
              <div className="text-center">
                <h2 className="text-3xl font-semibold text-slate-900 md:text-4xl">Memory Lane</h2>
                <p className="mx-auto mt-4 max-w-2xl text-slate-600">Every photo reminds me of how much warmth you bring into my life, even across miles.</p>
              </div>
              <div className="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                ${photos.map(
                  (photo, idx) =>
                    html`<${MemoryCard}
                      key=${photo}
                      photo=${photo}
                      caption=${captions[idx]}
                      idx=${idx}
                      onOpen=${(p, c) => setSelectedMemory({ photo: p, caption: c })}
                    />`
                )}
              </div>
            </${motion.section}>

            <${motion.section} variants=${sectionVariant} initial="hidden" whileInView="show" viewport=${{ once: true, amount: 0.25 }} className="px-6 py-20">
              <${GlassPanel} className="mx-auto max-w-4xl p-8 md:p-12">
                <h2 className="text-center text-3xl font-semibold text-slate-900 md:text-4xl">I know I hurt you</h2>
                <pre className="mt-8 whitespace-pre-wrap text-base leading-relaxed text-slate-700 md:text-lg">${typed}</pre>
              </${GlassPanel}>
            </${motion.section}>

            <${motion.section} variants=${sectionVariant} initial="hidden" whileInView="show" viewport=${{ once: true, amount: 0.25 }} className="px-6 py-20">
              <${GlassPanel} className="mx-auto max-w-3xl bg-gradient-to-br from-white/70 to-[#fdf6ff]/70 p-8 text-center md:p-12">
                <h2 className="text-3xl font-semibold text-slate-900">Can We Try Again?</h2>
                <div className="mt-8 space-y-6">
                  ${questions.map(
                    (q, i) => html`
                      <div key=${q} className="rounded-2xl border border-pink-100/80 bg-white/60 p-4 text-left">
                        <p className="text-slate-700">${i + 1}. ${q}</p>
                        <div className="relative mt-4 flex items-center gap-4">
                          <${motion.button}
                            whileTap=${{ scale: 0.95 }}
                            whileHover=${{ scale: 1.08 }}
                            onClick=${onYesClick}
                            className="rounded-full bg-rose px-6 py-2.5 text-sm font-medium text-white shadow-glow"
                          >
                            Yes
                          </${motion.button}>
                          <${motion.button}
                            animate=${{ x: noPosByQuestion[i].x, y: noPosByQuestion[i].y }}
                            transition=${{ type: "spring", stiffness: 350, damping: 15 }}
                            onMouseEnter=${() => moveNoButton(i)}
                            className="rounded-full border border-pink-300 bg-white px-6 py-2.5 text-sm text-slate-700"
                          >
                            No
                          </${motion.button}>
                        </div>
                      </div>
                    `
                  )}
                </div>
                <${AnimatePresence}>
                  ${yesBurst &&
                  html`<${motion.div} initial=${{ opacity: 0 }} animate=${{ opacity: 1 }} exit=${{ opacity: 0 }} className="pointer-events-none mt-8 flex justify-center gap-2 text-2xl">
                    ${Array.from({ length: 18 }).map(
                      (_, i) => html`<${motion.span}
                        key=${i}
                        initial=${{ y: 0, x: 0, opacity: 1, scale: 0.8 }}
                        animate=${{ x: (i - 9) * 16, y: -30 - Math.abs(i - 9) * 3, opacity: 0, scale: 1.4 }}
                        transition=${{ duration: 1.15, ease: "easeOut" }}
                      >
                        ${i % 2 ? "♥" : "✨"}
                      </${motion.span}>`
                    )}
                  </${motion.div}>`}
                </${AnimatePresence}>
              </${GlassPanel}>
            </${motion.section}>

            <${motion.section} variants=${sectionVariant} initial="hidden" whileInView="show" viewport=${{ once: true, amount: 0.35 }} className="px-6 py-12">
              <${GlassPanel} className="mx-auto flex max-w-4xl flex-col items-center justify-between gap-6 p-8 md:flex-row">
                <div>
                  <h3 className="text-xl font-semibold text-slate-900 md:text-2xl">Our song, while you read</h3>
                  <p className="mt-2 text-sm text-slate-600">Play or pause whenever you want.</p>
                </div>
                <button onClick=${toggleMusic} className="rounded-full bg-slate-900 px-6 py-3 text-white transition hover:scale-105">${isPlaying ? "Pause Music" : "Play Music"}</button>
              </${GlassPanel}>
            </${motion.section}>

            <${motion.section} variants=${sectionVariant} initial="hidden" whileInView="show" viewport=${{ once: true, amount: 0.35 }} className="px-6 py-8">
              <${GlassPanel} className="mx-auto max-w-3xl p-8 text-center">
                <p className="text-lg text-slate-700">Time since I met you</p>
                <p className="mt-2 text-sm text-slate-500">Since 11 November 2025</p>
                <p className="mt-3 text-2xl font-semibold text-slate-900 md:text-4xl">${days} days ${hours}h ${minutes}m ${seconds}s</p>
                <p className="mt-2 text-sm text-slate-600">${totalHours} total hours of loving you</p>
              </${GlassPanel}>
            </${motion.section}>

            <${motion.section} variants=${sectionVariant} initial="hidden" whileInView="show" viewport=${{ once: true, amount: 0.25 }} className="px-6 pb-24 pt-12">
              <${GlassPanel} className="mx-auto max-w-3xl p-8 text-center md:p-12">
                <p className="mx-auto mt-6 max-w-2xl text-lg leading-relaxed text-slate-700">
                  No matter what happens, I’ll always choose you <br />
                  I know I can’t undo what I said… but I don’t want one moment to erase everything we’ve built
                </p>
                <div className="mt-8 flex items-center justify-center gap-6">
                  <button onClick=${() => setSurpriseOpen((v) => !v)} className="block text-5xl md:text-6xl text-rose transition hover:scale-110" aria-label="Hidden surprise one">${surpriseOpen ? "♥" : "♡"}</button>
                  <button onClick=${() => setSecondSurpriseOpen((v) => !v)} className="block text-5xl md:text-6xl text-purple-500 transition hover:scale-110" aria-label="Hidden surprise two">${secondSurpriseOpen ? "♥" : "♡"}</button>
                </div>
                <${AnimatePresence}>
                  ${surpriseOpen &&
                  html`<${motion.p} initial=${{ opacity: 0, y: 8 }} animate=${{ opacity: 1, y: 0 }} exit=${{ opacity: 0, y: 8 }} className="mx-auto mt-4 max-w-xl rounded-2xl border border-pink-100 bg-pink-50/75 px-4 py-3 text-sm text-slate-700">
                    I’m not asking you to forget everything. I’m asking for one honest chance to prove I can love you better than I argued with you.
                  </${motion.p}>`}
                </${AnimatePresence}>
                <${AnimatePresence}>
                  ${secondSurpriseOpen &&
                  html`<${motion.p} initial=${{ opacity: 0, y: 8 }} animate=${{ opacity: 1, y: 0 }} exit=${{ opacity: 0, y: 8 }} className="mx-auto mt-3 max-w-xl rounded-2xl border border-purple-100 bg-purple-50/70 px-4 py-3 text-sm text-slate-700">
                    If you give me this chance, I won’t waste it. I’ll listen better, speak softer, and love you in the way you deserve.
                  </${motion.p}>`}
                </${AnimatePresence}>
              </${GlassPanel}>
            </${motion.section}>

            <${AnimatePresence}>
              ${selectedMemory &&
              html`
                <${motion.div}
                  initial=${{ opacity: 0 }}
                  animate=${{ opacity: 1 }}
                  exit=${{ opacity: 0 }}
                  onClick=${() => setSelectedMemory(null)}
                  className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 px-4 py-8 backdrop-blur-sm"
                >
                  <${motion.div}
                    initial=${{ opacity: 0, scale: 0.92, y: 25 }}
                    animate=${{ opacity: 1, scale: 1, y: 0 }}
                    exit=${{ opacity: 0, scale: 0.95, y: 20 }}
                    transition=${{ duration: 0.28 }}
                    onClick=${(e) => e.stopPropagation()}
                    className="relative w-full max-w-4xl overflow-hidden rounded-3xl border border-white/35 bg-white/90 shadow-soft"
                  >
                    <button
                      onClick=${() => setSelectedMemory(null)}
                      className="absolute right-3 top-3 z-10 rounded-full bg-white/85 px-3 py-1 text-sm text-slate-700"
                    >
                      Close
                    </button>
                    <img
                      src=${encodeURI(selectedMemory.photo)}
                      alt=${selectedMemory.caption}
                      className="max-h-[70vh] w-full bg-slate-100 object-contain"
                    />
                    <p className="px-5 py-4 text-center text-base text-slate-700 md:text-lg">${selectedMemory.caption}</p>
                  </${motion.div}>
                </${motion.div}>
              `}
            </${AnimatePresence}>
          </main>
        `;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </head>
  <body class="bg-white">
    <div id="root"></div>
  </body>
</html>
